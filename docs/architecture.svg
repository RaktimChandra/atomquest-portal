<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafafa"/>
      <stop offset="1" stop-color="#f0f0f5"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="layer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f5fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1200" height="820" fill="url(#bg)"/>

  <!-- Title -->
  <text x="40" y="50" font-size="28" font-weight="700" fill="#0a0a0a" letter-spacing="-0.5">AtomQuest Portal — System Architecture</text>
  <text x="40" y="74" font-size="13" fill="#64748b">Single-codebase Next.js 16 App Router · Serverless edge deployment · Postgres on Neon (ap-southeast-1)</text>

  <!-- Brand orb -->
  <circle cx="1130" cy="55" r="22" fill="url(#brand)" opacity="0.9"/>
  <circle cx="1130" cy="55" r="4" fill="#ffffff"/>
  <circle cx="1130" cy="55" r="18" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-dasharray="20 12"/>

  <!-- ============ CLIENT LAYER ============ -->
  <rect x="40" y="110" width="1120" height="135" rx="14" fill="url(#layer)" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="60" y="135" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1.5">CLIENT · BROWSER</text>

  <!-- Three role tiles -->
  <g transform="translate(60,150)">
    <rect width="340" height="78" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="16" y="22" font-size="11" font-weight="700" fill="#10b981" letter-spacing="0.8">EMPLOYEE</text>
    <text x="16" y="40" font-size="12" fill="#0a0a0a">Goal sheet · Weightage donut · Check-ins</text>
    <text x="16" y="56" font-size="11" fill="#64748b">Score engine preview · Notifications</text>
    <text x="16" y="70" font-size="10" fill="#94a3b8">/dashboard · /goals · /checkins · /audit · /notifications</text>
  </g>

  <g transform="translate(420,150)">
    <rect width="340" height="78" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="16" y="22" font-size="11" font-weight="700" fill="#f59e0b" letter-spacing="0.8">MANAGER (L1)</text>
    <text x="16" y="40" font-size="12" fill="#0a0a0a">Approval inbox · Inline edit · Team rollup</text>
    <text x="16" y="56" font-size="11" fill="#64748b">Check-in module · Analytics · Shared goals</text>
    <text x="16" y="70" font-size="10" fill="#94a3b8">/approvals · /team · /analytics · /completion</text>
  </g>

  <g transform="translate(780,150)">
    <rect width="340" height="78" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="16" y="22" font-size="11" font-weight="700" fill="#ec4899" letter-spacing="0.8">ADMIN / HR</text>
    <text x="16" y="40" font-size="12" fill="#0a0a0a">Cycle config · Org hierarchy · Escalations</text>
    <text x="16" y="56" font-size="11" fill="#64748b">CSV/Excel export · Audit trail · 3D galaxy</text>
    <text x="16" y="70" font-size="10" fill="#94a3b8">/cycles · /org · /escalations · /audit</text>
  </g>

  <!-- Arrow down -->
  <line x1="600" y1="245" x2="600" y2="280" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ EDGE / MIDDLEWARE ============ -->
  <rect x="280" y="290" width="640" height="60" rx="14" fill="url(#brand)" filter="url(#shadow)"/>
  <text x="600" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="0.5">VERCEL EDGE · MIDDLEWARE</text>
  <text x="600" y="338" text-anchor="middle" font-size="11" fill="#e0f2fe">Session validation · Role-based routing · &lt;100KB bundle (auth.config split)</text>

  <line x1="600" y1="350" x2="600" y2="385" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ APP LAYER ============ -->
  <rect x="40" y="395" width="1120" height="200" rx="14" fill="url(#layer)" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="60" y="420" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1.5">NEXT.JS 16 APP ROUTER · NODE.JS RUNTIME (SERVERLESS FUNCTIONS)</text>

  <!-- App tiles -->
  <g transform="translate(60,435)">
    <rect width="220" height="142" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="14" y="22" font-size="11" font-weight="700" fill="#3b82f6" letter-spacing="0.8">SERVER ACTIONS</text>
    <text x="14" y="42" font-size="11" fill="#0a0a0a">• Goal CRUD + draft autosave</text>
    <text x="14" y="58" font-size="11" fill="#0a0a0a">• Approval + return + lock</text>
    <text x="14" y="74" font-size="11" fill="#0a0a0a">• Check-in + score compute</text>
    <text x="14" y="90" font-size="11" fill="#0a0a0a">• Shared goal sync</text>
    <text x="14" y="106" font-size="11" fill="#0a0a0a">• Cycle / Org / Escalation</text>
    <text x="14" y="122" font-size="11" fill="#0a0a0a">• Notification ops</text>
    <text x="14" y="136" font-size="10" fill="#94a3b8">Zod validated · audit-logged</text>
  </g>

  <g transform="translate(300,435)">
    <rect width="220" height="142" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="14" y="22" font-size="11" font-weight="700" fill="#3b82f6" letter-spacing="0.8">ROUTE HANDLERS</text>
    <text x="14" y="42" font-size="11" fill="#0a0a0a">• /api/auth/[...nextauth]</text>
    <text x="14" y="58" font-size="11" fill="#0a0a0a">• /api/notifications (poll)</text>
    <text x="14" y="74" font-size="11" fill="#0a0a0a">• /api/escalations/run</text>
    <text x="14" y="90" font-size="11" fill="#0a0a0a">• /api/export/achievement</text>
    <text x="14" y="106" font-size="11" fill="#0a0a0a">• /api/export/.../xlsx</text>
    <text x="14" y="122" font-size="11" fill="#0a0a0a">• /sso · /sso/callback</text>
  </g>

  <g transform="translate(540,435)">
    <rect width="220" height="142" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="14" y="22" font-size="11" font-weight="700" fill="#3b82f6" letter-spacing="0.8">DOMAIN LOGIC</text>
    <text x="14" y="42" font-size="11" fill="#0a0a0a">• validators.ts (Zod schemas)</text>
    <text x="14" y="58" font-size="11" fill="#0a0a0a">• score-engine.ts (4 UoM)</text>
    <text x="14" y="74" font-size="11" fill="#0a0a0a">• audit logger</text>
    <text x="14" y="90" font-size="11" fill="#0a0a0a">• escalation rule engine</text>
    <text x="14" y="106" font-size="11" fill="#0a0a0a">• notification dispatch</text>
    <text x="14" y="122" font-size="11" fill="#0a0a0a">• role-based access</text>
  </g>

  <g transform="translate(780,435)">
    <rect width="220" height="142" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="14" y="22" font-size="11" font-weight="700" fill="#3b82f6" letter-spacing="0.8">UI LAYER</text>
    <text x="14" y="42" font-size="11" fill="#0a0a0a">• React 19 Server Components</text>
    <text x="14" y="58" font-size="11" fill="#0a0a0a">• Tailwind v3 + Radix UI</text>
    <text x="14" y="74" font-size="11" fill="#0a0a0a">• Framer Motion (springs)</text>
    <text x="14" y="90" font-size="11" fill="#0a0a0a">• R3F + Drei (3D scenes)</text>
    <text x="14" y="106" font-size="11" fill="#0a0a0a">• Recharts (analytics)</text>
    <text x="14" y="122" font-size="11" fill="#0a0a0a">• ExcelJS (XLSX export)</text>
  </g>

  <g transform="translate(1020,435)">
    <rect width="120" height="142" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="14" y="22" font-size="11" font-weight="700" fill="#3b82f6" letter-spacing="0.8">AUTH</text>
    <text x="14" y="42" font-size="11" fill="#0a0a0a">NextAuth v5</text>
    <text x="14" y="58" font-size="11" fill="#0a0a0a">JWT sessions</text>
    <text x="14" y="74" font-size="11" fill="#0a0a0a">bcrypt hash</text>
    <text x="14" y="90" font-size="11" fill="#0a0a0a">Mock Entra ID</text>
    <text x="14" y="106" font-size="11" fill="#0a0a0a">SSO-ready</text>
  </g>

  <line x1="600" y1="595" x2="600" y2="630" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ DATA LAYER ============ -->
  <rect x="40" y="640" width="1120" height="140" rx="14" fill="url(#layer)" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="60" y="665" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1.5">DATA · PRISMA 6 ORM + POSTGRES (NEON · AP-SOUTHEAST-1)</text>

  <g transform="translate(60,680)">
    <rect width="220" height="80" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="14" y="22" font-size="11" font-weight="700" fill="#0a0a0a">CORE ENTITIES</text>
    <text x="14" y="40" font-size="11" fill="#64748b">User · Cycle · ThrustArea</text>
    <text x="14" y="56" font-size="11" fill="#64748b">Goal · CheckIn · ManagerCheckIn</text>
    <text x="14" y="72" font-size="11" fill="#64748b">SharedGoalRecipient</text>
  </g>

  <g transform="translate(300,680)">
    <rect width="220" height="80" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="14" y="22" font-size="11" font-weight="700" fill="#0a0a0a">GOVERNANCE</text>
    <text x="14" y="40" font-size="11" fill="#64748b">AuditLog (immutable)</text>
    <text x="14" y="56" font-size="11" fill="#64748b">EscalationRule</text>
    <text x="14" y="72" font-size="11" fill="#64748b">Escalation</text>
  </g>

  <g transform="translate(540,680)">
    <rect width="220" height="80" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="14" y="22" font-size="11" font-weight="700" fill="#0a0a0a">REAL-TIME</text>
    <text x="14" y="40" font-size="11" fill="#64748b">Notification (poll 30s)</text>
    <text x="14" y="56" font-size="11" fill="#64748b">Indexed on (userId, isRead)</text>
    <text x="14" y="72" font-size="11" fill="#64748b">Connection pooler enabled</text>
  </g>

  <g transform="translate(780,680)">
    <rect width="360" height="80" rx="10" fill="url(#brand)" opacity="0.95"/>
    <text x="20" y="24" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.8">COST &amp; SCALE</text>
    <text x="20" y="42" font-size="11" fill="#e0f2fe">Vercel Hobby + Neon Free = ₹0 / month at demo scale</text>
    <text x="20" y="58" font-size="11" fill="#e0f2fe">Auto-pause idle compute · Pay-per-invocation</text>
    <text x="20" y="74" font-size="11" fill="#e0f2fe">Scale path: Postgres branch-per-env · CDN cached static</text>
  </g>

  <!-- Footer -->
  <text x="600" y="805" text-anchor="middle" font-size="10" fill="#94a3b8">AtomQuest Hackathon 2026 · Atomberg Technologies · Solo build by Raktim Chandra</text>
</svg>