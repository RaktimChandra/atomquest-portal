<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Inter, Geist, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafafa"/>
      <stop offset="1" stop-color="#eef0f6"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="brand-soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7f8fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-strong" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-brand" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <!-- ============ HEADER ============ -->
  <text x="50" y="55" font-size="32" font-weight="700" fill="#0a0a0a" letter-spacing="-0.5">AtomQuest Portal · System Architecture</text>
  <text x="50" y="82" font-size="14" fill="#64748b">Goal Setting &amp; Tracking · Next.js 16 + Postgres · Serverless edge deployment · Free-tier capable</text>

  <!-- Brand orb -->
  <g transform="translate(1320,55)">
    <circle r="26" fill="url(#brand)"/>
    <circle r="4" fill="#ffffff"/>
    <circle r="20" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-dasharray="22 14"/>
    <circle cx="20" cy="0" r="4" fill="#ffffff"/>
  </g>

  <!-- Legend -->
  <g transform="translate(50,110)">
    <rect width="1300" height="36" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <g transform="translate(20,18)">
      <rect x="0" y="-6" width="14" height="14" rx="2" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="22" y="4" font-size="11" fill="#374151">User-facing layer</text>
      <rect x="160" y="-6" width="14" height="14" rx="2" fill="url(#brand-soft)" stroke="#3b82f6"/>
      <text x="182" y="4" font-size="11" fill="#374151">Edge / middleware</text>
      <rect x="330" y="-6" width="14" height="14" rx="2" fill="#dcfce7" stroke="#10b981"/>
      <text x="352" y="4" font-size="11" fill="#374151">Server compute</text>
      <rect x="490" y="-6" width="14" height="14" rx="2" fill="#f3e8ff" stroke="#a855f7"/>
      <text x="512" y="4" font-size="11" fill="#374151">Persistence</text>
      <line x1="640" y1="0" x2="680" y2="0" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="688" y="4" font-size="11" fill="#374151">Data flow</text>
      <line x1="780" y1="0" x2="820" y2="0" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-brand)"/>
      <text x="828" y="4" font-size="11" fill="#374151">Auth / session</text>
    </g>
  </g>

  <!-- ============ CLIENT LAYER ============ -->
  <g transform="translate(50,170)">
    <rect width="1300" height="140" rx="14" fill="#fffbeb" stroke="#fde68a" filter="url(#shadow)"/>
    <text x="22" y="30" font-size="11" font-weight="700" fill="#92400e" letter-spacing="1.6">CLIENT · BROWSER · RESPONSIVE</text>

    <!-- Three role tiles -->
    <g transform="translate(22,48)">
      <rect width="412" height="78" rx="10" fill="url(#card)" stroke="#fde68a"/>
      <circle cx="36" cy="38" r="14" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="36" y="42" text-anchor="middle" font-size="14" fill="#92400e">👤</text>
      <text x="62" y="28" font-size="12" font-weight="700" fill="#10b981" letter-spacing="1">EMPLOYEE</text>
      <text x="62" y="46" font-size="12" fill="#0a0a0a">Goal sheet · Weightage donut · Check-ins</text>
      <text x="62" y="62" font-size="11" fill="#64748b">Live score preview · Notifications · Audit</text>
    </g>
    <g transform="translate(444,48)">
      <rect width="412" height="78" rx="10" fill="url(#card)" stroke="#fde68a"/>
      <circle cx="36" cy="38" r="14" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="36" y="42" text-anchor="middle" font-size="14" fill="#92400e">👔</text>
      <text x="62" y="28" font-size="12" font-weight="700" fill="#f59e0b" letter-spacing="1">MANAGER L1</text>
      <text x="62" y="46" font-size="12" fill="#0a0a0a">Approval inbox · Inline edit · Lock</text>
      <text x="62" y="62" font-size="11" fill="#64748b">Team rollup · Check-in · Analytics · Shared</text>
    </g>
    <g transform="translate(866,48)">
      <rect width="412" height="78" rx="10" fill="url(#card)" stroke="#fde68a"/>
      <circle cx="36" cy="38" r="14" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="36" y="42" text-anchor="middle" font-size="14" fill="#92400e">👑</text>
      <text x="62" y="28" font-size="12" font-weight="700" fill="#ec4899" letter-spacing="1">ADMIN / HR</text>
      <text x="62" y="46" font-size="12" fill="#0a0a0a">Cycles · Org · Escalations · Export</text>
      <text x="62" y="62" font-size="11" fill="#64748b">Completion dashboard · 3D Org Galaxy · Audit</text>
    </g>
  </g>

  <!-- Arrow down to middleware -->
  <line x1="700" y1="312" x2="700" y2="346" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ EDGE MIDDLEWARE ============ -->
  <g transform="translate(300,350)">
    <rect width="800" height="68" rx="14" fill="url(#brand)" filter="url(#shadow-strong)"/>
    <text x="400" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="0.8">VERCEL EDGE · NEXT.JS MIDDLEWARE</text>
    <text x="400" y="54" text-anchor="middle" font-size="11" fill="#dbeafe">JWT session validation · Role-based route gates · Sub-100KB bundle (auth.config split for edge safety)</text>
  </g>

  <line x1="700" y1="418" x2="700" y2="452" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ APPLICATION LAYER ============ -->
  <g transform="translate(50,456)">
    <rect width="1300" height="232" rx="14" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#shadow)"/>
    <text x="22" y="30" font-size="11" font-weight="700" fill="#166534" letter-spacing="1.6">APP LAYER · NEXT.JS 16 APP ROUTER · TYPESCRIPT STRICT · NODE.JS SERVERLESS FUNCTIONS</text>

    <!-- 5 sub-tiles -->
    <g transform="translate(22,48)">
      <rect width="246" height="168" rx="10" fill="url(#card)" stroke="#bbf7d0"/>
      <text x="14" y="24" font-size="11" font-weight="700" fill="#3b82f6" letter-spacing="0.8">SERVER ACTIONS</text>
      <line x1="14" y1="32" x2="232" y2="32" stroke="#bbf7d0"/>
      <text x="14" y="50" font-size="11" fill="#0a0a0a">• Goal CRUD + autosave</text>
      <text x="14" y="68" font-size="11" fill="#0a0a0a">• Approve / Return / Lock</text>
      <text x="14" y="86" font-size="11" fill="#0a0a0a">• Check-in + score compute</text>
      <text x="14" y="104" font-size="11" fill="#0a0a0a">• Shared-goal sync</text>
      <text x="14" y="122" font-size="11" fill="#0a0a0a">• Cycle / Org / Escalation</text>
      <text x="14" y="140" font-size="11" fill="#0a0a0a">• Notification ops</text>
      <text x="14" y="160" font-size="10" fill="#94a3b8" font-style="italic">Zod-validated · audit-logged</text>
    </g>

    <g transform="translate(278,48)">
      <rect width="246" height="168" rx="10" fill="url(#card)" stroke="#bbf7d0"/>
      <text x="14" y="24" font-size="11" font-weight="700" fill="#3b82f6" letter-spacing="0.8">ROUTE HANDLERS</text>
      <line x1="14" y1="32" x2="232" y2="32" stroke="#bbf7d0"/>
      <text x="14" y="50" font-size="11" fill="#0a0a0a">• /api/auth/[...nextauth]</text>
      <text x="14" y="68" font-size="11" fill="#0a0a0a">• /api/notifications (poll)</text>
      <text x="14" y="86" font-size="11" fill="#0a0a0a">• /api/escalations/run</text>
      <text x="14" y="104" font-size="11" fill="#0a0a0a">• /api/export/achievement</text>
      <text x="14" y="122" font-size="11" fill="#0a0a0a">• /api/export/.../xlsx</text>
      <text x="14" y="140" font-size="11" fill="#0a0a0a">• /sso · /sso/callback</text>
      <text x="14" y="160" font-size="10" fill="#94a3b8" font-style="italic">Streaming · runtime: nodejs</text>
    </g>

    <g transform="translate(534,48)">
      <rect width="246" height="168" rx="10" fill="url(#card)" stroke="#bbf7d0"/>
      <text x="14" y="24" font-size="11" font-weight="700" fill="#3b82f6" letter-spacing="0.8">DOMAIN LOGIC</text>
      <line x1="14" y1="32" x2="232" y2="32" stroke="#bbf7d0"/>
      <text x="14" y="50" font-size="11" fill="#0a0a0a">• validators.ts (Zod)</text>
      <text x="14" y="68" font-size="11" fill="#0a0a0a">• score-engine.ts (4 UoM)</text>
      <text x="14" y="86" font-size="11" fill="#0a0a0a">• Audit logger</text>
      <text x="14" y="104" font-size="11" fill="#0a0a0a">• Escalation rule engine</text>
      <text x="14" y="122" font-size="11" fill="#0a0a0a">• Notification dispatch</text>
      <text x="14" y="140" font-size="11" fill="#0a0a0a">• Role-based access</text>
      <text x="14" y="160" font-size="10" fill="#94a3b8" font-style="italic">Pure functions · testable</text>
    </g>

    <g transform="translate(790,48)">
      <rect width="246" height="168" rx="10" fill="url(#card)" stroke="#bbf7d0"/>
      <text x="14" y="24" font-size="11" font-weight="700" fill="#3b82f6" letter-spacing="0.8">UI LAYER</text>
      <line x1="14" y1="32" x2="232" y2="32" stroke="#bbf7d0"/>
      <text x="14" y="50" font-size="11" fill="#0a0a0a">• React 19 Server Comps</text>
      <text x="14" y="68" font-size="11" fill="#0a0a0a">• Tailwind v3 + Radix UI</text>
      <text x="14" y="86" font-size="11" fill="#0a0a0a">• Framer Motion (springs)</text>
      <text x="14" y="104" font-size="11" fill="#0a0a0a">• R3F + Drei (3D scenes)</text>
      <text x="14" y="122" font-size="11" fill="#0a0a0a">• Recharts (analytics)</text>
      <text x="14" y="140" font-size="11" fill="#0a0a0a">• ExcelJS (xlsx export)</text>
      <text x="14" y="160" font-size="10" fill="#94a3b8" font-style="italic">Monochrome + brand accent</text>
    </g>

    <g transform="translate(1046,48)">
      <rect width="232" height="168" rx="10" fill="url(#card)" stroke="#bbf7d0"/>
      <text x="14" y="24" font-size="11" font-weight="700" fill="#3b82f6" letter-spacing="0.8">AUTH &amp; IDENTITY</text>
      <line x1="14" y1="32" x2="218" y2="32" stroke="#bbf7d0"/>
      <text x="14" y="50" font-size="11" fill="#0a0a0a">NextAuth v5 beta</text>
      <text x="14" y="68" font-size="11" fill="#0a0a0a">JWT sessions (30d)</text>
      <text x="14" y="86" font-size="11" fill="#0a0a0a">bcrypt password hash</text>
      <text x="14" y="104" font-size="11" fill="#0a0a0a">Mock Entra ID SSO</text>
      <text x="14" y="122" font-size="11" fill="#0a0a0a">3 roles, RBAC enforced</text>
      <text x="14" y="140" font-size="11" fill="#0a0a0a">Edge-safe config split</text>
      <text x="14" y="160" font-size="10" fill="#94a3b8" font-style="italic">Production-ready</text>
    </g>
  </g>

  <line x1="700" y1="688" x2="700" y2="722" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ DATA LAYER ============ -->
  <g transform="translate(50,726)">
    <rect width="1300" height="120" rx="14" fill="#faf5ff" stroke="#e9d5ff" filter="url(#shadow)"/>
    <text x="22" y="30" font-size="11" font-weight="700" fill="#6b21a8" letter-spacing="1.6">DATA LAYER · PRISMA 6 ORM · POSTGRES ON NEON (AP-SOUTHEAST-1) · POOLED CONNECTIONS</text>

    <g transform="translate(22,48)">
      <rect width="304" height="62" rx="10" fill="url(#card)" stroke="#e9d5ff"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#0a0a0a">CORE ENTITIES</text>
      <text x="14" y="40" font-size="11" fill="#64748b">User · Cycle · ThrustArea · Goal</text>
      <text x="14" y="55" font-size="11" fill="#64748b">CheckIn · ManagerCheckIn · SharedGoal</text>
    </g>

    <g transform="translate(338,48)">
      <rect width="304" height="62" rx="10" fill="url(#card)" stroke="#e9d5ff"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#0a0a0a">GOVERNANCE</text>
      <text x="14" y="40" font-size="11" fill="#64748b">AuditLog (append-only, JSON diff)</text>
      <text x="14" y="55" font-size="11" fill="#64748b">EscalationRule · Escalation</text>
    </g>

    <g transform="translate(654,48)">
      <rect width="304" height="62" rx="10" fill="url(#card)" stroke="#e9d5ff"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#0a0a0a">REAL-TIME</text>
      <text x="14" y="40" font-size="11" fill="#64748b">Notification (30s polling)</text>
      <text x="14" y="55" font-size="11" fill="#64748b">Indexed (userId, isRead)</text>
    </g>

    <g transform="translate(970,48)">
      <rect width="308" height="62" rx="10" fill="url(#brand)"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.8">COST &amp; SCALE</text>
      <text x="14" y="40" font-size="11" fill="#dbeafe">Vercel Hobby + Neon Free = ₹0 / month</text>
      <text x="14" y="55" font-size="11" fill="#dbeafe">Auto-pause idle compute · Branch-per-env path</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="700" y="880" text-anchor="middle" font-size="11" fill="#94a3b8">
    AtomQuest Hackathon 2026 · Atomberg Technologies · Solo build by Raktim Chandra · github.com/RaktimChandra/atomquest-portal
  </text>
</svg>
